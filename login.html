<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录 | BaoLong Lab</title>
  <style>
    :root{
      --bg:#f7f6f2;
      --paper:#fffdfa;
      --ink:#171717;
      --muted:#77736b;
      --line:#ded9cf;
      --soft:#eeeae2;
      --dark:#111111;
      --brown:#b45a2d;
      --blue:#d9e1ef;
      --cream:#f4efe5;
      --shadow:0 24px 70px rgba(0,0,0,.10);
      --radius:34px;
    }

    *{box-sizing:border-box}
    html{
      scroll-behavior:smooth;
      height:100%;
    }
    body{
      margin:0;
      width:100%;
      height:100vh;
      min-height:100vh;
      font-family:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color:var(--ink);
      background:
        radial-gradient(circle at 10% 12%, rgba(217,225,239,.92), transparent 34%),
        radial-gradient(circle at 90% 88%, rgba(244,239,229,.96), transparent 38%),
        var(--bg);
      overflow:hidden;
      letter-spacing:.01em;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background:
        linear-gradient(rgba(255,255,255,.32) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.32) 1px, transparent 1px);
      background-size:42px 42px;
      mask-image:linear-gradient(to bottom, rgba(0,0,0,.92), rgba(0,0,0,.22));
      z-index:-1;
    }

    a{color:inherit;text-decoration:none}
    button,input{font:inherit}

    .login-header{
      height:104px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:20px;
      padding:0 48px;
      border-bottom:1px solid rgba(0,0,0,.06);
      background:rgba(247,246,242,.82);
      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);
      position:sticky;
      top:0;
      z-index:10;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:18px;
      min-width:330px;
    }

    .brand-logo-img{
      width:108px;
      height:108px;
      object-fit:contain;
      flex:0 0 auto;
      display:block;
      background:transparent !important;
      border-radius:0 !important;
    }

    .brand-text{
      font-size:16px;
      letter-spacing:.34em;
      text-transform:uppercase;
      white-space:nowrap;
    }

    .header-actions{
      display:flex;
      align-items:center;
      gap:14px;
    }

    .pill-btn{
      border:1px solid var(--line);
      border-radius:999px;
      padding:10px 18px;
      background:rgba(255,255,255,.62);
      cursor:pointer;
      transition:.25s ease;
      color:#1c1c1c;
    }
    .pill-btn:hover{
      background:#111;
      color:#fff;
      border-color:#111;
      transform:translateY(-1px);
    }

    .page{
      height:calc(100vh - 104px);
      min-height:0;
      display:grid;
      grid-template-columns:minmax(0,1.12fr) minmax(360px,.78fr);
      gap:56px;
      align-items:center;
      max-width:1500px;
      margin:0 auto;
      padding:28px 48px 28px;
    }

    .intro{
      position:relative;
      min-height:0;
      height:100%;
      display:flex;
      flex-direction:column;
      justify-content:center;
      padding:0;
    }

    .kicker{
      margin:0 0 20px;
      color:#6f6a62;
      font-size:13px;
      letter-spacing:.32em;
      text-transform:uppercase;
      font-weight:760;
    }

    h1{
      margin:0;
      max-width:860px;
      font-size:clamp(54px,7.6vw,112px);
      line-height:.92;
      letter-spacing:-.055em;
      font-weight:820;
    }

    .lead{
      margin:22px 0 0;
      max-width:670px;
      color:#4e4a44;
      font-size:19px;
      line-height:1.85;
    }

    .feature-row{
      margin-top:26px;
      display:flex;
      flex-wrap:wrap;
      gap:10px;
    }

    .feature-chip{
      border:1px solid var(--line);
      border-radius:999px;
      background:rgba(255,255,255,.58);
      padding:10px 14px;
      color:#5e5a52;
      font-size:13px;
    }

    .login-panel{
      position:relative;
      width:100%;
      max-width:460px;
      justify-self:end;
      border-radius:34px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.78);
      box-shadow:var(--shadow);
      overflow:hidden;
      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);
    }

    .panel-top{
      padding:24px 28px 20px;
      background:#111;
      color:#fff;
      border-radius:32px 32px 0 0;
    }

    .panel-kicker{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      color:rgba(255,255,255,.62);
      font-size:12px;
      letter-spacing:.24em;
      text-transform:uppercase;
      font-weight:700;
      margin-bottom:18px;
    }

    .status-dot{
      display:none;
    }

    .panel-top h2{
      margin:0;
      font-size:clamp(30px,3.2vw,44px);
      line-height:1;
      letter-spacing:-.045em;
    }

    .panel-top p{
      margin:14px 0 0;
      color:rgba(255,255,255,.68);
      line-height:1.65;
      font-size:14px;
    }

    .login-form{
      padding:28px;
    }

    .field{
      margin-bottom:14px;
    }

    .field label{
      display:block;
      margin-bottom:8px;
      color:#4e4a44;
      font-size:13px;
      font-weight:700;
      letter-spacing:.05em;
    }

    .field input{
      width:100%;
      height:50px;
      border:1px solid var(--line);
      border-radius:999px;
      background:rgba(255,255,255,.86);
      outline:none;
      padding:0 20px;
      color:#111;
      transition:.22s ease;
    }

    .field input:focus{
      border-color:#111;
      box-shadow:0 0 0 4px rgba(0,0,0,.055);
      background:#fff;
    }

    .form-row{
      display:flex;
      justify-content:space-between;
      gap:16px;
      margin:4px 0 18px;
      color:#6f6a62;
      font-size:13px;
    }

    .check{
      display:flex;
      align-items:center;
      gap:8px;
    }

    .check input{accent-color:#111}

    .text-link{
      border:0;
      background:transparent;
      padding:0;
      color:#1c1c1c;
      cursor:pointer;
      border-bottom:1px solid rgba(0,0,0,.28);
    }

    .btn-main{
      width:100%;
      min-height:52px;
      border:1px solid #111;
      background:#111;
      color:#fff;
      border-radius:999px;
      cursor:pointer;
      transition:.24s ease;
      font-weight:700;
    }
    .btn-main:hover{transform:translateY(-2px);box-shadow:0 14px 34px rgba(0,0,0,.16)}

    .divider{
      margin:16px 0;
      display:flex;
      align-items:center;
      gap:12px;
      color:#9a958d;
      font-size:12px;
    }
    .divider::before,.divider::after{content:"";height:1px;background:var(--line);flex:1}

    .ghost-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    .ghost-btn{
      min-height:44px;
      border:1px solid var(--line);
      border-radius:999px;
      background:rgba(255,255,255,.7);
      cursor:pointer;
      transition:.22s ease;
      color:#333;
    }
    .ghost-btn:hover{border-color:#111;transform:translateY(-1px)}

    .panel-note{
      margin:16px 0 0;
      padding:12px 14px;
      border-radius:18px;
      background:#f5f2eb;
      color:#6f6a62;
      line-height:1.65;
      font-size:13px;
    }

    .toast{
      position:fixed;
      left:50%;
      bottom:30px;
      transform:translate(-50%,20px);
      min-width:min(420px,calc(100vw - 32px));
      padding:14px 18px;
      border:1px solid var(--line);
      border-radius:999px;
      background:rgba(255,255,255,.92);
      box-shadow:0 18px 46px rgba(0,0,0,.12);
      color:#111;
      opacity:0;
      pointer-events:none;
      transition:.24s ease;
      text-align:center;
      z-index:30;
    }
    .toast.show{opacity:1;transform:translate(-50%,0)}

    .legal-footer{
      position:fixed;
      right:28px;
      bottom:18px;
      z-index:4;
      text-align:right;
      padding:0;
      color:#77736b;
      font-size:12px;
      line-height:1.8;
      max-width:520px;
      pointer-events:none;
    }


    @media (min-width:1101px) and (max-height:820px){
      .login-header{height:86px;padding:0 42px}
      .brand-logo-img{width:72px;height:72px}
      .page{
        height:calc(100vh - 86px);
        padding-top:20px;
        padding-bottom:20px;
      }
      h1{font-size:clamp(48px,6.6vw,92px)}
      .lead{font-size:16px;line-height:1.7;margin-top:18px}
      .feature-row{margin-top:20px}
      .panel-top{padding:22px 26px 16px}
      .panel-kicker{margin-bottom:20px}
      .login-form{padding:24px 26px}
      .field{margin-bottom:14px}
      .field input{height:50px}
      .form-row{margin-bottom:18px}
      .btn-main{min-height:52px}
      .divider{margin:16px 0}
      .panel-note{margin-top:16px;padding:12px 14px}
      .legal-footer{display:none}
    }

    @media (max-width:1200px){
      .login-header{padding:0 28px}
      .brand{min-width:auto}
      .brand-logo-img{width:55px !important;height:55px !important;max-width:55px !important;max-height:55px !important;}
    }

    @media (max-width:1100px){
      body{
        height:auto;
        min-height:100vh;
        overflow-x:hidden;
        overflow-y:auto;
      }
      .login-header{height:auto}
      .page{
        height:auto;
        min-height:calc(100vh - 104px);
        grid-template-columns:1fr;
        gap:34px;
        padding:42px 28px 58px;
      }
      .intro{
        height:auto;
        min-height:auto;
        text-align:left;
        padding-top:20px;
        justify-content:center;
      }
      .login-panel{justify-self:center;max-width:520px}
      .legal-footer{
        position:static;
        text-align:center;
        padding:28px 20px 42px;
        max-width:none;
      }
    }

    @media (max-width:680px){
      .login-header{height:auto;padding:16px 18px;gap:12px}
      .brand{min-width:0;gap:10px}
      .brand-text{font-size:13px;letter-spacing:.22em;max-width:calc(100vw - 190px);overflow:hidden;text-overflow:ellipsis}
      .brand-logo-img{width:44px !important;height:44px !important;max-width:44px !important;max-height:44px !important;}
      .header-actions{gap:8px}
      .pill-btn{padding:9px 13px;font-size:13px}
      .page{padding:34px 18px 44px}
      h1{font-size:clamp(46px,15vw,74px);letter-spacing:-.06em}
      .lead{font-size:15px;line-height:1.78}
      .feature-row{margin-top:24px}
      .panel-top{padding:26px 24px 20px;border-radius:30px 30px 0 0}
      .login-panel{border-radius:32px}
      .login-form{padding:26px 22px 24px}
      .form-row{display:block;line-height:2}
      .ghost-grid{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <header class="login-header">
    <a class="brand" href="index.html" aria-label="Back to BaoLong Lab home">
      <img class="brand-logo-img" src="images/logo-eye.webp" alt="BaoLong Lab Logo" />
      <div class="brand-text">BAOLONG LAB</div>
    </a>
    <div class="header-actions">
      <button class="pill-btn" type="button" onclick="location.href='index.html'" data-zh="返回首页" data-en="Back Home">返回首页</button>
      <button class="pill-btn" type="button" id="langBtn">中文 / EN</button>
    </div>
  </header>

  <main class="page">
    <section class="intro" aria-label="BaoLong Lab Login Intro">
      <p class="kicker" data-zh="登录入口" data-en="Member Entrance">登录入口</p>
      <h1 data-zh="进入你的 BaoLong Lab" data-en="Enter your BaoLong Lab">进入你的 BaoLong Lab</h1>
      <p class="lead" data-zh="登录后，后续可以接入收藏灵感板、保存 Prompt、管理简历模板和下载记录。当前页面先保留前端入口，方便后面接真实账号系统。" data-en="After logging in, this space can connect saved boards, prompts, resume templates and download records. This page keeps the front-end entrance ready for future account integration.">登录后，后续可以接入收藏灵感板、保存 Prompt、管理简历模板和下载记录。当前页面先保留前端入口，方便后面接真实账号系统。</p>
      <div class="feature-row">
        <span class="feature-chip" data-zh="灵感板收藏" data-en="Saved Boards">灵感板收藏</span>
        <span class="feature-chip" data-zh="Prompt 记录" data-en="Prompt History">Prompt 记录</span>
        <span class="feature-chip" data-zh="简历模板管理" data-en="Resume Workspace">简历模板管理</span>
      </div>
    </section>

    <section class="login-panel" id="loginPanel" aria-label="Login Form">
      <div class="panel-top">
        <div class="panel-kicker">
          <span data-zh="账户登录" data-en="Account Login">账户登录</span>
          <span class="status-dot" aria-hidden="true"></span>
        </div>
        <h2 data-zh="欢迎回来" data-en="Welcome back">欢迎回来</h2>
        <p data-zh="先用轻量登录页承接入口，后续可以继续接邮箱验证码、账号密码或第三方登录。" data-en="Start with a lightweight login entrance, then connect email codes, password login or third-party login later.">先用轻量登录页承接入口，后续可以继续接邮箱验证码、账号密码或第三方登录。</p>
      </div>

      <form class="login-form" id="loginForm">
        <div class="field">
          <label for="email" data-zh="邮箱 / 手机号" data-en="Email / Phone">邮箱 / 手机号</label>
          <input id="email" name="email" type="text" autocomplete="username" placeholder="name@example.com" />
        </div>
        <div class="field">
          <label for="password" data-zh="密码" data-en="Password">密码</label>
          <input id="password" name="password" type="password" autocomplete="current-password" placeholder="••••••••" />
        </div>

        <div class="form-row">
          <label class="check"><input type="checkbox" checked /> <span data-zh="记住我" data-en="Remember me">记住我</span></label>
          <button class="text-link" type="button" onclick="showToast('reset')" data-zh="忘记密码？" data-en="Forgot password?">忘记密码？</button>
        </div>

        <button class="btn-main" type="submit" data-zh="登录" data-en="Log in">登录</button>

        <div class="divider" data-zh="或" data-en="or">或</div>

        <div class="ghost-grid">
          <button class="ghost-btn" type="button" onclick="showToast('signup')" data-zh="创建账号" data-en="Create account">创建账号</button>
          <button class="ghost-btn" type="button" onclick="location.href='index.html'" data-zh="先逛逛" data-en="Browse first">先逛逛</button>
        </div>

        <div class="panel-note" data-zh="提示：这个版本是前端登录页，占位给后续后端接口使用；不会真的提交账号密码。" data-en="Note: this is a front-end login page prepared for future backend integration. It does not submit real account credentials.">提示：这个版本是前端登录页，占位给后续后端接口使用；不会真的提交账号密码。</div>
      </form>
    </section>
  </main>

  <footer class="legal-footer">
    <span data-zh="© 2026 BaoLong Lab. 保留所有权利。" data-en="© 2026 BaoLong Lab. All rights reserved.">© 2026 BaoLong Lab. 保留所有权利。</span><br>
    <span data-zh="BaoLong Lab 原创内容与工具版权归 BaoLong Lab 所有。" data-en="Original content and tools by BaoLong Lab.">BaoLong Lab 原创内容与工具版权归 BaoLong Lab 所有。</span>
  </footer>

  <div class="toast" id="toast"></div>

  <script>
    const langBtn = document.getElementById('langBtn');
    const toast = document.getElementById('toast');

    function getLang(){ return localStorage.getItem('baolongLanguage') || 'zh'; }
    function setLang(lang){ localStorage.setItem('baolongLanguage', lang); applyLang(lang); }
    function applyLang(lang){
      document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
      document.title = lang === 'zh' ? '登录 | BaoLong Lab' : 'Log in | BaoLong Lab';
      document.querySelectorAll('[data-zh][data-en]').forEach(el => { el.textContent = el.dataset[lang]; });
      langBtn.textContent = '中文 / EN';
      langBtn.setAttribute('aria-label', lang === 'zh' ? 'Switch to English' : '切换到中文');
    }

    langBtn.addEventListener('click', () => setLang(getLang() === 'zh' ? 'en' : 'zh'));

    function showToast(type){
      const lang = getLang();
      const textMap = {
        login: { zh:'登录接口还没接入，后续接后端后这里就可以真正登录。', en:'Login API is not connected yet. This will work after backend integration.' },
        signup: { zh:'注册入口已预留，后续可以接邮箱验证码或账号系统。', en:'Sign-up entrance is reserved for future email code or account system.' },
        reset: { zh:'找回密码入口已预留，后续接账号系统后启用。', en:'Password reset is reserved for future account integration.' }
      };
      toast.textContent = textMap[type][lang];
      toast.classList.add('show');
      window.clearTimeout(window.__toastTimer);
      window.__toastTimer = window.setTimeout(() => toast.classList.remove('show'), 2600);
    }

    document.getElementById('loginForm').addEventListener('submit', function(e){
      e.preventDefault();
      showToast('login');
    });

    applyLang(getLang());
  </script>
</body>
</html>
